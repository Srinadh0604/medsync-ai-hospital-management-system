<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSync Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-background" aria-hidden="true">
        <div class="orb orb-one"></div>
        <div class="orb orb-two"></div>
    </div>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-header">
                <div class="brand-mark">✚</div>
                <div>
                    <h1>Create account</h1>
                    <p>Join the MedSync care team</p>
                </div>
                <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>

            <form id="registerForm" novalidate>
                <div class="field-group">
                    <label for="registerName">Name</label>
                    <input type="text" id="registerName" name="name" placeholder="Dr. Asha Kumar" required>
                    <span class="field-error" id="registerNameError"></span>
                </div>

                <div class="field-group">
                    <label for="registerEmail">Email address</label>
                    <input type="email" id="registerEmail" name="email" placeholder="name@hospital.com" required>
                    <span class="field-error" id="registerEmailError"></span>
                </div>

                <div class="field-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" name="password" placeholder="Create a strong password" required>
                    <span class="field-error" id="registerPasswordError"></span>
                </div>

                <div class="field-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                    <span class="field-error" id="confirmPasswordError"></span>
                </div>

                <div id="formStatus" class="form-status" role="status" aria-live="polite"></div>

                <button type="submit" id="registerButton" class="primary-btn">
                    <span class="btn-label">Create Account</span>
                    <span class="btn-spinner" aria-hidden="true"></span>
                </button>

                <p class="footer-text">
                    Already have an account?
                    <a href="index.html" class="text-link">Sign in</a>
                </p>
            </form>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
