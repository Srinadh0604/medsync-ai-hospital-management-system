
<!DOCTYPE html>
<html>

<head>
    <title>Appointments</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>MedSync</h2>

        <a href="dashboard.html">Dashboard</a>

        <a id="doctorMenu" href="doctors.html">
            Doctors
        </a>

        <a id="patientMenu" href="patients.html">
            Patients
        </a>

        <a href="appointments.html">
            Appointments
        </a>

        <a href="reports.html">
            Reports
        </a>

        <a id="auditMenu" href="audit.html">
            Audit Logs
        </a>

        <a id="aiMenu" href="ai.html">
            AI Assistant
        </a>

        <a href="#" onclick="logout()">
            Logout
        </a>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="form-card">

            <h2>Schedule Appointment</h2>

            <input id="patientId" type="number" placeholder="Patient ID">


            <input id="doctorId" type="number" placeholder="Doctor ID">

            <input id="appointmentTime" type="datetime-local">

            <select id="status">

                <option value="">Select Status</option>
                <option value="BOOKED">Booked</option>
                <option value="SCHEDULED">Scheduled</option>
                <option value="COMPLETED">Completed</option>
                <option value="CANCELLED">Cancelled</option>

            </select>

            <button onclick="addAppointment()">
                Schedule Appointment
            </button>

        </div>

        <div class="table-card">

            <h2>Appointments List</h2>

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Patient ID</th>
                        <th>Patient</th>
                        <th>Doctor ID</th>
                        <th>Doctor</th>
                        <th>Date & Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>

                </thead>

                <tbody id="appointmentTable">

                </tbody>

            </table>

        </div>

    </div>
    <script src="js/authGuard.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/role.js"></script>
    <script src="js/appointments.js"></script>


    <script>
        applyRolePermissions();
    </script>

</body>
