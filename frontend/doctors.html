<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Doctors</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="sidebar">

        <h2>MedSync</h2>

        <a href="dashboard.html">Dashboard</a>

        <a id="doctorMenu" href="doctors.html">
            Doctors
        </a>

        <a id="patientMenu" href="patients.html">
            Patients
        </a>

        <a href="appointments.html">
            Appointments
        </a>

        <a href="reports.html">
            Reports
        </a>

        <a id="auditMenu" href="audit.html">
            Audit Logs
        </a>

        <a id="aiMenu" href="ai.html">
            AI Assistant
        </a>

        <a href="#" onclick="logout()">
            Logout
        </a>

    </div>

    <div class="main-content">

        <div class="navbar">
            Doctor Management
        </div>

        <div class="form-container">

            <h2>Add Doctor</h2>

            <input type="text" id="name" placeholder="Doctor Name">

            <input type="text" id="specialization" placeholder="Specialization">

            <input type="email" id="email" placeholder="Doctor Email">
            
            <button onclick="addDoctor()">
                Add Doctor
            </button>

        </div>

        <div class="table-container">

            <h2>Doctors List</h2>

            <table id="doctorTable">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Specialization</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>
    <script src="js/authGuard.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/role.js"></script>
    <script src="js/doctors.js"></script>


    <script>
        applyRolePermissions();
    </script>

</body>

</html>
