<link rel="stylesheet" href="css/style.css">

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Patients</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>MedSync</h2>

        <a href="dashboard.html">Dashboard</a>

        <a id="doctorMenu" href="doctors.html">
            Doctors
        </a>

        <a id="patientMenu" href="patients.html">
            Patients
        </a>

        <a href="appointments.html">
            Appointments
        </a>

        <a href="reports.html">
            Reports
        </a>

        <a id="auditMenu" href="audit.html">
            Audit Logs
        </a>

        <a id="aiMenu" href="ai.html">
            AI Assistant
        </a>

        <a href="#" onclick="logout()">
            Logout
        </a>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <!-- Add Patient Form -->
        <div class="form-card">

            <h2>Add Patient</h2>

            <input id="name" placeholder="Patient Name">
            <input id="age" type="number" placeholder="Age">
            <input id="disease" placeholder="Disease">
            <input id="prescription" placeholder="Prescription">
            <input id="email" placeholder="Email">
            <input id="doctorId" type="number" placeholder="Doctor ID">

            <button onclick="addPatient()">
                Add Patient
            </button>

        </div>

        <!-- Patients Table -->
        <div class="table-card">

            <h2>Patients List</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Disease</th>
                        <th>Doctor</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="patientTable"></tbody>

            </table>

        </div>

    </div>
    <script src="js/authGuard.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/role.js"></script>
    <script src="js/patients.js"></script>


    <script>
        applyRolePermissions();
    </script>

</body>
