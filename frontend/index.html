<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>MedSync Login</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="login-container">

    <h1>MedSync</h1>

    <p>Hospital Management System</p>

    <input
            type="email"
            id="email"
            placeholder="Enter Email">

    <input
            type="password"
            id="password"
            placeholder="Enter Password">

    <button onclick="login()">
        Login
    </button>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
