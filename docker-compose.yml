services:



  mysql:

    image: mysql:8.0



    container_name: medsync-mysql



    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: medsync



    ports:

      - "3307:3306"



    volumes:

      - mysql-data:/var/lib/mysql



    healthcheck:

      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]

      interval: 10s

      timeout: 5s

      retries: 10



  app:

    build: .



    container_name: medsync-app



    ports:

      - "8080:8080"



    environment:

      DB_URL: jdbc:mysql://mysql:3306/medsync

      DB_USER: root

      DB_PASSWORD: root



    depends_on:

      mysql:

        condition: service_healthy



volumes:

  mysql-data: